        属性的数字签名。
      parameters:
      - description: 角色的无符号 UUID（32 位十六进制字符串）
        in: path
        name: uuid
        required: true
        type: string
      - description: 是否不含签名，默认 true
        in: query
        name: unsigned
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功，返回角色信息（含属性）
          schema:
            $ref: '#/definitions/yggdrasil.ProfileResponse'
        "204":
          description: 角色不存在
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 查询角色属性'
