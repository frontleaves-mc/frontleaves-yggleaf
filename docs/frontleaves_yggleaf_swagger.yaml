          ----------
           外键约束
          ----------
      role_name:
        description: 关联角色名称
        type: string
      skin_libraries:
        description: 皮肤库关联
        items:
          $ref: '#/definitions/entity.SkinLibrary'
        type: array
      updated_at:
        type: string
      user_cape_libraries:
