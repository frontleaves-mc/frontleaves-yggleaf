  user.SetSkinRequest:
    properties:
      skin_library_id:
        description: 皮肤库 ID（null 或空字符串表示卸下）
        type: string
    type: object
  user.UpdateGamePasswordRequest:
    properties:
      confirm_password:
        description: 确认新密码（需与 new_password 一致）
        maxLength: 128
        minLength: 6
        type: string
      new_password:
        description: 新游戏密码（6-128 字符）
        maxLength: 128
        minLength: 6
        type: string
    required:
    - confirm_password
    - new_password
    type: object
  user.UserCurrentResponse:
    properties:
      extend:
        allOf:
        - $ref: '#/definitions/user.UserExtend'
        description: 扩展信息（含账户完善状态）
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: 用户实体信息
    type: object
  user.UserExtend:
    properties:
      account_ready:
        description: |-
          AccountReady 账户完善状态。

            - "ready":          所有必要信息已填写完毕
            - "game_password":  游戏密码未设置（返回缺失字段名）
        type: string
    type: object
  xBase.BaseResponse:
    properties:
      code:
        type: integer
      context:
        type: string
      data: {}
      error_message:
        type: string
      message:
        type: string
      output:
        type: string
      overhead:
        type: integer
    type: object
  yggdrasil.Agent:
    properties:
      name:
        description: 代理名称（如 "Minecraft"）
        type: string
      version:
        description: 代理版本
        type: integer
    type: object
  yggdrasil.AuthenticateRequest:
    properties:
      agent:
        allOf:
        - $ref: '#/definitions/yggdrasil.Agent'
        description: 客户端代理信息
      clientToken:
        description: 客户端令牌标识（可选）
        type: string
      password:
        description: 游戏账户密码
        maxLength: 128
        type: string
      requestUser:
        description: 是否请求用户信息
        type: boolean
      username:
        description: 邮箱或手机号 (RFC 5321 max)
        maxLength: 320
        type: string
    required:
    - password
    - username
    type: object
  yggdrasil.AuthenticateResponse:
    properties:
      accessToken:
        description: 服务端生成的访问令牌
        type: string
      availableProfiles:
        description: 用户可用的角色列表
        items:
          $ref: '#/definitions/yggdrasil.ProfileResponse'
        type: array
      clientToken:
        description: 客户端令牌（与请求一致）
        type: string
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileResponse'
        description: 自动选中的角色（单角色时）
      user:
        allOf:
        - $ref: '#/definitions/yggdrasil.UserResponse'
        description: 用户信息（requestUser 时返回）
    type: object
  yggdrasil.BatchProfileItem:
    properties:
      id:
        description: 角色无符号 UUID
        type: string
      name:
        description: 角色名称
        type: string
    type: object
  yggdrasil.InvalidateRequest:
    properties:
      accessToken:
        description: 访问令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
    required:
    - accessToken
    type: object
  yggdrasil.JoinServerRequest:
    properties:
      accessToken:
        description: 访问令牌 (UUID 格式 + 余量)
        maxLength: 368
        type: string
      selectedProfile:
        description: 角色无符号 UUID (固定 32 字符)
        maxLength: 32
        type: string
      serverId:
        description: 服务端随机标识
        maxLength: 256
        type: string
    required:
    - accessToken
    - selectedProfile
    - serverId
    type: object
  yggdrasil.MetadataLinks:
    properties:
      homepage:
        description: 主页地址
        type: string
      register:
        description: 注册地址
        type: string
    type: object
  yggdrasil.MetadataMeta:
    properties:
      feature.non_email_login:
        description: 是否支持非邮箱登录
        type: boolean
      implementationName:
        description: 实现名称
        type: string
      implementationVersion:
        description: 实现版本
        type: string
      links:
        allOf:
        - $ref: '#/definitions/yggdrasil.MetadataLinks'
        description: 相关链接（可选）
      serverName:
        description: 服务端名称
        type: string
    type: object
  yggdrasil.MetadataResponse:
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/yggdrasil.MetadataMeta'
        description: 元数据信息
      signaturePublickey:
        description: RSA 签名公钥（PEM 格式）
        type: string
      skinDomains:
        description: 皮肤域名白名单
        items:
          type: string
        type: array
    type: object
  yggdrasil.ProfileResponse:
    properties:
      id:
        description: 角色无符号 UUID
        type: string
      name:
        description: 角色名称
        type: string
      properties:
        description: 角色属性列表（含材质签名等）
        items:
          $ref: '#/definitions/yggdrasil.PropertyResponse'
        type: array
    type: object
  yggdrasil.ProfileSelection:
    properties:
      id:
        description: 角色 UUID（无符号）
        type: string
      name:
        description: 角色名称
        type: string
    type: object
  yggdrasil.PropertyResponse:
    properties:
      name:
        description: 属性名称（如 "textures"）
        type: string
      signature:
        description: 属性签名（Base64 编码，可选）
        type: string
      value:
        description: 属性值（Base64 编码）
        type: string
    type: object
  yggdrasil.RefreshRequest:
    properties:
      accessToken:
        description: 当前令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
      requestUser:
        description: 是否请求用户信息
        type: boolean
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileSelection'
        description: 要选择的角色
    required:
    - accessToken
    type: object
  yggdrasil.RefreshResponse:
    properties:
      accessToken:
        description: 新的访问令牌
        type: string
      clientToken:
        description: 客户端令牌（与原令牌一致）
        type: string
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileResponse'
        description: 选中的角色信息
      user:
        allOf:
        - $ref: '#/definitions/yggdrasil.UserResponse'
        description: 用户信息（requestUser 时返回）
    type: object
  yggdrasil.SignoutRequest:
    properties:
      password:
        description: 密码
        maxLength: 128
        type: string
      username:
        description: 邮箱或手机号
        maxLength: 320
        type: string
    required:
    - password
    - username
    type: object
  yggdrasil.UserPropertyResponse:
    properties:
      name:
        description: 属性名称（如 "preferredLanguage"）
        type: string
      value:
        description: 属性值
        type: string
    type: object
  yggdrasil.UserResponse:
    properties:
      id:
        description: 用户无符号 UUID
        type: string
      properties:
        description: 用户属性列表
        items:
          $ref: '#/definitions/yggdrasil.UserPropertyResponse'
        type: array
    type: object
  yggdrasil.ValidateRequest:
    properties:
      accessToken:
        description: 访问令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
    required:
    - accessToken
    type: object
  yggdrasil.YggdrasilError:
    properties:
      cause:
        description: 错误原因（可选）
        type: string
      error:
        description: 错误标识（机器可读）
        type: string
      errorMessage:
        description: 错误详情（人类可读）
        type: string
    type: object
info:
  contact: {}
paths:
  /:
    get:
      consumes:
      - application/json
      description: 由 authlib-injector 自动发现和启动器调用，返回 API 元数据（服务名称、签名公钥、皮肤域名等），authlib-injector
        据此自动配置 API 位置。
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/yggdrasil.MetadataResponse'
      summary: '[公共] API 元数据'
      tags:
      - Yggdrasil-公共接口
  /admin/game-profile/users/{user_id}/quota:
    post:
      consumes:
      - application/json
      description: 管理员调整指定用户的游戏档案配额总额度（相对变化量）
      parameters:
      - description: 目标用户 ID
        in: path
        name: user_id
        required: true
        type: string
      - description: 调整配额请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.AdminAdjustQuotaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 调整成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.GameProfileQuota'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 用户配额不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 调整用户游戏档案配额'
      tags:
      - 管理员-游戏档案接口
  /admin/issue-type:
    post:
      consumes:
      - application/json
      description: 管理员创建新的问题分类类型，需指定名称和排序值
      parameters:
      - description: 创建问题类型请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.CreateIssueTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/issue.IssueTypeListItem'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 创建类型'
      tags:
      - 管理员问题接口
  /admin/issue-type/{id}:
    delete:
      consumes:
      - application/json
      description: 管理员删除指定的问题类型，已关联的问题不受影响
      parameters:
      - description: 类型 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 无效的类型 ID
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 删除类型'
      tags:
      - 管理员问题接口
    put:
      consumes:
      - application/json
      description: 管理员编辑已有问题类型的名称、描述、排序或启用状态
      parameters:
      - description: 类型 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 编辑问题类型请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateIssueTypeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/issue.IssueTypeListItem'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 问题类型不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 编辑类型'
      tags:
      - 管理员问题接口
  /admin/issue/{id}/note:
    put:
      consumes:
      - application/json
      description: 管理员更新问题的内部备注信息，备注内容长度不超过 2000 字符，仅管理员可见
      parameters:
      - description: 问题 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新备注请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateIssueNoteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 备注更新成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 请求参数错误或备注超长
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 问题不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 更新备注'
      tags:
      - 管理员问题接口
  /admin/issue/{id}/priority:
    put:
      consumes:
      - application/json
      description: 管理员修改问题的优先级级别（low/medium/high/urgent）
      parameters:
      - description: 问题 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 修改优先级请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateIssuePriorityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 优先级更新成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 问题不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 修改优先级'
      tags:
      - 管理员问题接口
  /admin/issue/{id}/status:
    put:
      consumes:
      - application/json
      description: 管理员修改问题的处理状态，系统会校验状态流转合法性并自动记录关闭时间
      parameters:
      - description: 问题 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 修改状态请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateIssueStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 状态更新成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 请求参数错误或非法的状态流转
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 问题不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 修改状态'
      tags:
      - 管理员问题接口
  /admin/issue/list:
    get:
      consumes:
      - application/json
      description: 管理员查看所有用户的问题列表，支持按状态、优先级、问题类型、关键词筛选，分页返回
      parameters:
      - description: 页码（默认 1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认 20，最大 50）
        in: query
        name: page_size
        type: integer
      - description: 状态筛选：registered/pending/processing/resolved/unplanned/closed
        in: query
        name: status
        type: string
      - description: 优先级筛选：low/medium/high/urgent
        in: query
        name: priority
        type: string
      - description: 问题类型 ID
        in: query
        name: issue_type_id
        type: integer
      - description: 关键词搜索（匹配标题）
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/issue.IssueListResponse'
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[管理] 全量问题列表'
      tags:
      - 管理员问题接口
  /admin/users:
    get:
      consumes:
      - application/json
      description: 管理员分页查询用户列表，支持角色、关键词、时间范围筛选
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数(最大100)
        in: query
        name: page_size
        type: integer
      - description: 角色筛选(SUPER_ADMIN/ADMIN/PLAYER)
        in: query
        name: role
        type: string
      - description: 关键词搜索(用户名/邮箱)
        in: query
        name: keyword
        type: string
      - description: 注册时间起始(RFC3339)
        in: query
        name: start_time
        type: string
      - description: 注册时间截止(RFC3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AdminUserListResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 用户列表'
      tags:
      - 管理员-用户接口
  /admin/users/{user_id}:
    get:
      consumes:
      - application/json
      description: 获取用户完整详情，包含账户信息、游戏档案配额、资源库配额及皮肤/披风资源列表
      parameters:
      - description: 目标用户 ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AdminUserDetailResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 需要超级管理员权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      security:
      - BearerAuth: []
      summary: '[超管] 用户详情'
      tags:
      - 管理员-用户接口
  /api/profiles/minecraft:
    post:
      consumes:
      - application/json
      description: 由 Minecraft 服务端调用，根据角色名称列表批量查询角色信息。仅返回无符号 UUID 和名称，不包含角色属性。不存在的角色不包含在响应中，单次最多查询
        10 个。
      parameters:
      - description: 角色名称列表（JSON 数组，最多 10 个）
        in: body
        name: names
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            items:
              $ref: '#/definitions/yggdrasil.BatchProfileItem'
            type: array
        "400":
          description: 请求体格式错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 批量查询角色'
      tags:
      - Yggdrasil-会话接口
  /api/user/profile/{uuid}/{textureType}:
    delete:
      consumes:
      - application/json
      description: 由启动器调用，清除指定角色的皮肤或披风材质。需通过 Bearer Token 认证，验证令牌有效且角色属于该用户。当前返回 501
        功能尚未实现。
      parameters:
      - description: 角色的无符号 UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: 材质类型：skin 或 cape
        in: path
        name: textureType
        required: true
        type: string
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 清除成功
        "400":
          description: UUID 格式错误或材质类型无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "401":
          description: 未授权或令牌无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 角色不属于该用户
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "501":
          description: 功能尚未实现
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[玩家] 清除材质'
      tags:
      - Yggdrasil-公共接口
    put:
      consumes:
      - multipart/form-data
      description: 由启动器调用，上传皮肤或披风材质。需通过 Bearer Token 认证，验证令牌有效且角色属于该用户。当前返回 501 功能尚未实现。
      parameters:
      - description: 角色的无符号 UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: 材质类型：skin 或 cape
        in: path
        name: textureType
        required: true
        type: string
      - description: 皮肤模型（slim 或空，仅 skin 类型）
        in: formData
        name: model
        type: string
      - description: PNG 图片文件
        in: formData
        name: file
        required: true
        type: file
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 上传成功
        "400":
          description: UUID 格式错误或材质类型无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "401":
          description: 未授权或令牌无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 角色不属于该用户
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "501":
          description: 功能尚未实现
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[玩家] 上传材质'
      tags:
      - Yggdrasil-公共接口
  /authserver/authenticate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，使用邮箱或手机号+密码进行登录认证。单角色时自动绑定到令牌并返回 selectedProfile，多角色时通过
        refresh 接口选择角色。
      parameters:
      - description: 登录认证请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.AuthenticateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 认证成功
          schema:
            $ref: '#/definitions/yggdrasil.AuthenticateResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 认证失败（密码错误/账户异常）
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 密码登录认证'
      tags:
      - Yggdrasil-认证接口
  /authserver/invalidate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，吊销指定的 accessToken。无论是否成功，均返回 204 No Content。
      parameters:
      - description: 吊销令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.InvalidateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 处理完成
      summary: '[客户端] 吊销指定令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/refresh:
    post:
      consumes:
      - application/json
      description: 由启动器调用，使用 accessToken 刷新令牌。吊销原令牌并颁发新令牌，携带 selectedProfile 时为角色选择操作。
      parameters:
      - description: 刷新令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            $ref: '#/definitions/yggdrasil.RefreshResponse'
        "400":
          description: 参数错误（角色已绑定仍指定）
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 刷新令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/signout:
    post:
      consumes:
      - application/json
      description: 由启动器调用，验证用户凭证后吊销该用户的所有有效令牌。成功返回 204 No Content，密码错误返回 403 错误。
      parameters:
      - description: 登出请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.SignoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 登出成功
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 密码错误或账户异常
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 吊销用户所有令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/validate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，验证 accessToken 是否有效。有效返回 204 No Content，无效返回 403 错误。
      parameters:
      - description: 验证令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.ValidateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 令牌有效
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或 clientToken 不匹配
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 验证令牌有效性'
      tags:
      - Yggdrasil-认证接口
