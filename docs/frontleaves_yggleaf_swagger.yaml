      id:
        description: 披风库记录 ID
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      name:
        description: 披风名称
        type: string
      texture_hash:
        description: 纹理 SHA256 哈希
        type: string
      texture_url:
        description: 纹理文件下载链接（由 bucket.Get 解析）
        type: string
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 创建者/上传者用户 ID
        type: integer
    type: object
  library.CapeSimpleListResponse:
    properties:
      items:
        description: 披风精简列表
        items:
          $ref: '#/definitions/library.CapeSimpleResponse'
        type: array
    type: object
  library.CapeSimpleResponse:
    properties:
      id:
        description: 披风库记录 ID
        type: integer
      name:
        description: 披风名称
        type: string
    type: object
  library.CreateCapeRequest:
    properties:
      is_public:
        description: 是否公开（可选，默认 false）
        type: boolean
      name:
        description: 披风名称
        type: string
      texture:
        description: 披风纹理文件 base64
        type: string
    required:
    - name
    - texture
    type: object
  library.CreateSkinRequest:
    properties:
      is_public:
        description: 是否公开（可选，默认 false）
        type: boolean
      model:
        description: 皮肤模型 (1=classic, 2=slim)
        enum:
        - 1
        - 2
        type: integer
      name:
        description: 皮肤名称
        type: string
      texture:
        description: 皮肤纹理文件 base64
        type: string
    required:
    - model
    - name
    - texture
    type: object
  library.GiftCapeRequest:
    properties:
      assignment_type:
        description: 分配类型 (2=gift, 3=admin)
        type: integer
      cape_library_id:
        description: 披风库 ID
        type: string
    required:
    - assignment_type
    - cape_library_id
    type: object
  library.GiftSkinRequest:
    properties:
      assignment_type:
        description: 分配类型 (2=gift, 3=admin)
        type: integer
      skin_library_id:
        description: 皮肤库 ID
        type: string
    required:
    - assignment_type
    - skin_library_id
    type: object
  library.SkinListResponse:
    properties:
      items:
        description: 皮肤列表
        items:
          $ref: '#/definitions/library.SkinResponse'
        type: array
      total:
        description: 总数
        type: integer
    type: object
  library.SkinResponse:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型（mine 模式下返回）
      id:
        description: 皮肤库记录 ID
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      model:
        allOf:
        - $ref: '#/definitions/entity.ModelType'
        description: 皮肤模型 (1=classic, 2=slim)
      name:
        description: 皮肤名称
        type: string
      texture_hash:
        description: 纹理 SHA256 哈希
        type: string
      texture_url:
        description: 纹理文件下载链接（由 bucket.Get 解析）
        type: string
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 创建者/上传者用户 ID
        type: integer
    type: object
  library.SkinSimpleListResponse:
    properties:
      items:
        description: 皮肤精简列表
        items:
          $ref: '#/definitions/library.SkinSimpleResponse'
        type: array
    type: object
  library.SkinSimpleResponse:
    properties:
      id:
        description: 皮肤库记录 ID
        type: integer
      name:
        description: 皮肤名称
        type: string
    type: object
  library.UpdateCapeRequest:
    properties:
      is_public:
        description: 是否公开（可选）
        type: boolean
      name:
        description: 披风名称（可选）
        type: string
    type: object
  library.UpdateSkinRequest:
    properties:
      is_public:
        description: 是否公开（可选）
        type: boolean
      name:
        description: 皮肤名称（可选）
        type: string
    type: object
  sync.FileMetadata:
    properties:
      hash:
        description: '"sha256:<hex>"'
        type: string
      name:
        description: 文件名，如 "jei-1.20.1.jar"
        type: string
      path:
        description: 相对路径，如 "mods/jei-1.20.1.jar"
        type: string
      size:
        description: 文件大小（字节）
        type: integer
    type: object
  sync.SyncMetadataResponse:
    properties:
      files:
        items:
          $ref: '#/definitions/sync.FileMetadata'
        type: array
      scanned_at:
        type: string
      total:
        type: integer
    type: object
  user.AddGameProfileRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  user.AdminAdjustQuotaRequest:
    properties:
      delta:
        description: 配额变化量（正数增加，负数减少）
        type: integer
      remark:
        description: 备注（可选，最长 255 字符）
        maxLength: 255
        type: string
    required:
    - delta
    type: object
  user.ChangeUsernameRequest:
    properties:
      new_name:
        type: string
    required:
    - new_name
    type: object
  user.GameProfileListResponse:
    properties:
      items:
        description: 游戏档案列表
        items:
          $ref: '#/definitions/user.GameProfileResponse'
        type: array
    type: object
  user.GameProfileResponse:
    properties:
      cape:
        allOf:
        - $ref: '#/definitions/library.CapeResponse'
        description: 装备的披风信息（含 texture_url）
      cape_library_id:
        description: 装备的披风库 ID
        type: integer
      id:
        description: 档案 ID
        type: integer
      name:
        description: 档案用户名
        type: string
      skin:
        allOf:
        - $ref: '#/definitions/library.SkinResponse'
        description: 装备的皮肤信息（含 texture_url）
      skin_library_id:
        description: 装备的皮肤库 ID
        type: integer
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 关联用户 ID
        type: integer
      uuid:
        description: UUIDv7 标识
        type: string
