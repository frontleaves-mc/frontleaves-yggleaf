  /sessionserver/session/minecraft/hasJoined:
    get:
      consumes:
      - application/json
      description: 由 Minecraft 服务端调用，通过 username 和 serverId 验证客户端是否已成功加入服务器。验证通过后返回角色完整信息（含
        textures 属性和数字签名）。
      parameters:
      - description: 角色名称
        in: query
        name: username
        required: true
        type: string
      - description: 服务端生成的随机标识
        in: query
        name: serverId
        required: true
        type: string
      - description: 客户端 IP 地址（可选，用于防止代理连接）
        in: query
        name: ip
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功，返回角色完整信息
          schema:
            $ref: '#/definitions/yggdrasil.ProfileResponse'
        "204":
          description: 未找到匹配的会话
        "400":
          description: 缺少必要参数或参数过长
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 验证客户端会话'
      tags:
      - Yggdrasil-会话接口
  /sessionserver/session/minecraft/join:
    post:
      consumes:
      - application/json
      description: 由 Minecraft 客户端调用，记录加入服务器的会话信息。验证令牌有效且 selectedProfile 与令牌绑定角色一致。
      parameters:
      - description: 加入服务器请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.JoinServerRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 会话记录成功
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或角色不匹配
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
