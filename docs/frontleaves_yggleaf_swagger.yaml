      cape_library:
        allOf:
        - $ref: '#/definitions/entity.CapeLibrary'
        description: 关联披风库
      cape_library_id:
        description: 关联披风库ID
        type: integer
      id:
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.UserSkinLibrary:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型
      id:
        type: integer
      skin_library:
        allOf:
        - $ref: '#/definitions/entity.SkinLibrary'
        description: 关联皮肤库
      skin_library_id:
        description: 关联皮肤库ID
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entityType.AssignmentType:
    enum:
    - 1
    - 2
    - 3
    format: int32
    type: integer
    x-enum-varnames:
    - AssignmentTypeNormal
    - AssignmentTypeGift
    - AssignmentTypeAdmin
  issue.CreateIssueRequest:
    properties:
      content:
        maxLength: 10000
        type: string
      issue_type_id:
        type: integer
      priority:
        description: 值域须与 bConst.IssuePriority 常量保持同步
        enum:
        - low
        - medium
        - high
        - urgent
        type: string
      title:
        maxLength: 128
        minLength: 1
        type: string
