  /sync/mods/metadata:
    get:
      description: 根据 mode 扫描服务端 mods 目录下指定子目录的 .jar 文件，返回文件列表及 SHA-256 哈希
      parameters:
      - default: all
        description: '扫描模式: server-服务端必须模组, client-客户端推荐模组, all-全部'
        enum:
