definitions:
  entity.CapeLibrary:
    properties:
      id:
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      name:
        description: 披风名称
        type: string
      texture:
        description: 披风纹理文件ID(雪花算法)
        type: integer
      texture_hash:
        description: 披风纹理哈希
        type: string
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 创建者/上传者用户ID(为空代表系统内置披风)
        type: integer
    type: object
  entity.GameProfile:
    properties:
      cape_library:
        allOf:
        - $ref: '#/definitions/entity.CapeLibrary'
        description: 关联披风库
      cape_library_id:
        description: 关联披风库ID
        type: integer
      id:
        type: integer
      name:
        description: 游戏内用户名
        type: string
      skin_library:
        allOf:
        - $ref: '#/definitions/entity.SkinLibrary'
        description: 关联皮肤库
      skin_library_id:
        description: 关联皮肤库ID
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
      uuid:
        description: Minecraft UUID
        type: string
    type: object
  entity.GameProfileQuota:
    properties:
      id:
        type: integer
      total:
        description: 总额度
        type: integer
      updated_at:
        type: string
      used:
        description: 已使用额度
        type: integer
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.LibraryQuota:
    properties:
      capes_private_total:
        description: 披风配额
        type: integer
      capes_private_used:
        description: 私有披风已使用额度
        type: integer
      capes_public_total:
        description: 公开披风总额度
        type: integer
      capes_public_used:
        description: 公开披风已使用额度
        type: integer
      id:
        type: integer
      skins_private_total:
        description: 皮肤配额
        type: integer
      skins_private_used:
        description: 私有皮肤已使用额度
        type: integer
      skins_public_total:
        description: 公开皮肤总额度
        type: integer
      skins_public_used:
        description: 公开皮肤已使用额度
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.ModelType:
    enum:
    - 1
    - 2
    format: int32
    type: integer
    x-enum-comments:
      ModelTypeClassic: 经典皮肤模型 (Steve)
      ModelTypeSlim: 纤细皮肤模型 (Alex)
    x-enum-descriptions:
    - 经典皮肤模型 (Steve)
    - 纤细皮肤模型 (Alex)
    x-enum-varnames:
    - ModelTypeClassic
    - ModelTypeSlim
  entity.Role:
    properties:
      description:
        description: 角色描述
        type: string
      display_name:
        description: 角色显示名称
        type: string
      name:
        allOf:
        - $ref: '#/definitions/entity.RoleName'
        description: 角色名称
    type: object
  entity.RoleName:
    enum:
    - SUPER_ADMIN
    - ADMIN
    - PLAYER
    type: string
    x-enum-comments:
      RoleAdmin: 管理员角色名称
      RolePlayer: 普通玩家角色名称
      RoleSuperAdmin: 超级管理员角色名称
    x-enum-descriptions:
    - 超级管理员角色名称
    - 管理员角色名称
    - 普通玩家角色名称
    x-enum-varnames:
    - RoleSuperAdmin
    - RoleAdmin
    - RolePlayer
  entity.SkinLibrary:
    properties:
      id:
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      model:
        allOf:
        - $ref: '#/definitions/entity.ModelType'
        description: 皮肤模型(1=classic,2=slim)
      name:
        description: 皮肤名称
        type: string
      texture:
        description: 皮肤纹理文件ID(雪花算法)
        type: integer
      texture_hash:
        description: 皮肤纹理哈希
        type: string
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 创建者/上传者用户ID(为空代表系统内置皮肤)
        type: integer
    type: object
  entity.User:
    properties:
      cape_libraries:
        description: 披风库关联
        items:
          $ref: '#/definitions/entity.CapeLibrary'
        type: array
      email:
        description: 用户邮箱
        type: string
      game_profiles:
        description: 游戏档案关联
        items:
          $ref: '#/definitions/entity.GameProfile'
        type: array
      has_ban:
        description: 用户是否被封禁禁止登录
        type: boolean
      id:
        type: integer
      jailed_at:
        description: 用户被监禁的时间
        type: string
      library_quotas:
        description: 资源库配额关联
        items:
          $ref: '#/definitions/entity.LibraryQuota'
        type: array
      phone:
        description: 用户手机号
        type: string
      role:
        allOf:
        - $ref: '#/definitions/entity.Role'
        description: |-
          ----------
           外键约束
          ----------
      role_name:
        description: 关联角色名称
        type: string
      skin_libraries:
        description: 皮肤库关联
        items:
          $ref: '#/definitions/entity.SkinLibrary'
        type: array
      updated_at:
        type: string
      user_cape_libraries:
        description: 用户披风关联
        items:
          $ref: '#/definitions/entity.UserCapeLibrary'
        type: array
      user_skin_libraries:
        description: 用户皮肤关联
        items:
          $ref: '#/definitions/entity.UserSkinLibrary'
        type: array
      username:
        description: 用户用户名
        type: string
    type: object
  entity.UserCapeLibrary:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型
      cape_library:
        allOf:
        - $ref: '#/definitions/entity.CapeLibrary'
        description: 关联披风库
      cape_library_id:
        description: 关联披风库ID
        type: integer
      id:
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.UserSkinLibrary:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型
      id:
        type: integer
      skin_library:
        allOf:
        - $ref: '#/definitions/entity.SkinLibrary'
        description: 关联皮肤库
      skin_library_id:
        description: 关联皮肤库ID
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entityType.AssignmentType:
    enum:
    - 1
    - 2
    - 3
    format: int32
    type: integer
    x-enum-varnames:
    - AssignmentTypeNormal
    - AssignmentTypeGift
    - AssignmentTypeAdmin
  library.CapeListResponse:
    properties:
      items:
        description: 披风列表
        items:
          $ref: '#/definitions/library.CapeResponse'
        type: array
      total:
        description: 总数
        type: integer
    type: object
  library.CapeResponse:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型（mine 模式下返回）
      id:
        description: 披风库记录 ID
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      name:
        description: 披风名称
        type: string
      texture_hash:
        description: 纹理 SHA256 哈希
        type: string
      texture_url:
        description: 纹理文件下载链接（由 bucket.Get 解析）
        type: string
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 创建者/上传者用户 ID
        type: integer
    type: object
  library.CapeSimpleListResponse:
    properties:
      items:
        description: 披风精简列表
        items:
          $ref: '#/definitions/library.CapeSimpleResponse'
        type: array
    type: object
  library.CapeSimpleResponse:
    properties:
      id:
        description: 披风库记录 ID
        type: integer
      name:
        description: 披风名称
        type: string
    type: object
  library.CreateCapeRequest:
    properties:
      is_public:
        description: 是否公开（可选，默认 false）
        type: boolean
      name:
        description: 披风名称
        type: string
      texture:
        description: 披风纹理文件 base64
        type: string
    required:
    - name
    - texture
    type: object
  library.CreateSkinRequest:
    properties:
      is_public:
        description: 是否公开（可选，默认 false）
        type: boolean
      model:
        description: 皮肤模型 (1=classic, 2=slim)
        enum:
        - 1
        - 2
        type: integer
      name:
        description: 皮肤名称
        type: string
      texture:
        description: 皮肤纹理文件 base64
        type: string
    required:
    - model
    - name
    - texture
    type: object
  library.GiftCapeRequest:
    properties:
      assignment_type:
        description: 分配类型 (2=gift, 3=admin)
        type: integer
      cape_library_id:
        description: 披风库 ID
        type: string
    required:
    - assignment_type
    - cape_library_id
    type: object
  library.GiftSkinRequest:
    properties:
      assignment_type:
        description: 分配类型 (2=gift, 3=admin)
        type: integer
      skin_library_id:
        description: 皮肤库 ID
        type: string
    required:
    - assignment_type
    - skin_library_id
    type: object
  library.SkinListResponse:
    properties:
      items:
        description: 皮肤列表
        items:
          $ref: '#/definitions/library.SkinResponse'
        type: array
      total:
        description: 总数
        type: integer
    type: object
  library.SkinResponse:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
        description: 关联类型（mine 模式下返回）
      id:
        description: 皮肤库记录 ID
        type: integer
      is_public:
        description: 是否公开
        type: boolean
      model:
        allOf:
        - $ref: '#/definitions/entity.ModelType'
        description: 皮肤模型 (1=classic, 2=slim)
      name:
        description: 皮肤名称
        type: string
      texture_hash:
        description: 纹理 SHA256 哈希
        type: string
      texture_url:
        description: 纹理文件下载链接（由 bucket.Get 解析）
        type: string
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 创建者/上传者用户 ID
        type: integer
    type: object
  library.SkinSimpleListResponse:
    properties:
      items:
        description: 皮肤精简列表
        items:
          $ref: '#/definitions/library.SkinSimpleResponse'
        type: array
    type: object
  library.SkinSimpleResponse:
    properties:
      id:
        description: 皮肤库记录 ID
        type: integer
      name:
        description: 皮肤名称
        type: string
    type: object
  library.UpdateCapeRequest:
    properties:
      is_public:
        description: 是否公开（可选）
        type: boolean
      name:
        description: 披风名称（可选）
        type: string
    type: object
  library.UpdateSkinRequest:
    properties:
      is_public:
        description: 是否公开（可选）
        type: boolean
      name:
        description: 皮肤名称（可选）
        type: string
    type: object
  user.AddGameProfileRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  user.ChangeUsernameRequest:
    properties:
      new_name:
        type: string
    required:
    - new_name
    type: object
  user.GameProfileListResponse:
    properties:
      items:
        description: 游戏档案列表
        items:
          $ref: '#/definitions/user.GameProfileResponse'
        type: array
    type: object
  user.GameProfileResponse:
    properties:
      cape:
        allOf:
        - $ref: '#/definitions/library.CapeResponse'
        description: 装备的披风信息（含 texture_url）
      cape_library_id:
        description: 装备的披风库 ID
        type: integer
      id:
        description: 档案 ID
        type: integer
      name:
        description: 档案用户名
        type: string
      skin:
        allOf:
        - $ref: '#/definitions/library.SkinResponse'
        description: 装备的皮肤信息（含 texture_url）
      skin_library_id:
        description: 装备的皮肤库 ID
        type: integer
      updated_at:
        description: 更新时间
        type: string
      user_id:
        description: 关联用户 ID
        type: integer
      uuid:
        description: UUIDv7 标识
        type: string
    type: object
  user.SetCapeRequest:
    properties:
      cape_library_id:
        description: 披风库 ID（null 或空字符串表示卸下）
        type: string
    type: object
  user.SetSkinRequest:
    properties:
      skin_library_id:
        description: 皮肤库 ID（null 或空字符串表示卸下）
        type: string
    type: object
  user.UpdateGamePasswordRequest:
    properties:
      confirm_password:
        description: 确认新密码（需与 new_password 一致）
        maxLength: 128
        minLength: 6
        type: string
      new_password:
        description: 新游戏密码（6-128 字符）
        maxLength: 128
        minLength: 6
        type: string
    required:
    - confirm_password
    - new_password
    type: object
  user.UserCurrentResponse:
    properties:
      extend:
        allOf:
        - $ref: '#/definitions/user.UserExtend'
        description: 扩展信息（含账户完善状态）
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: 用户实体信息
    type: object
  user.UserExtend:
    properties:
      account_ready:
        description: |-
          AccountReady 账户完善状态。

            - "ready":          所有必要信息已填写完毕
            - "game_password":  游戏密码未设置（返回缺失字段名）
        type: string
    type: object
  xBase.BaseResponse:
    properties:
      code:
        type: integer
      context:
        type: string
      data: {}
      error_message:
        type: string
      message:
        type: string
      output:
        type: string
      overhead:
        type: integer
    type: object
  yggdrasil.Agent:
    properties:
      name:
        description: 代理名称（如 "Minecraft"）
        type: string
      version:
        description: 代理版本
        type: integer
    type: object
  yggdrasil.AuthenticateRequest:
    properties:
      agent:
        allOf:
        - $ref: '#/definitions/yggdrasil.Agent'
        description: 客户端代理信息
      clientToken:
        description: 客户端令牌标识（可选）
        type: string
      password:
        description: 游戏账户密码
        maxLength: 128
        type: string
      requestUser:
        description: 是否请求用户信息
        type: boolean
      username:
        description: 邮箱或手机号 (RFC 5321 max)
        maxLength: 320
        type: string
    required:
    - password
    - username
    type: object
  yggdrasil.AuthenticateResponse:
    properties:
      accessToken:
        description: 服务端生成的访问令牌
        type: string
      availableProfiles:
        description: 用户可用的角色列表
        items:
          $ref: '#/definitions/yggdrasil.ProfileResponse'
        type: array
      clientToken:
        description: 客户端令牌（与请求一致）
        type: string
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileResponse'
        description: 自动选中的角色（单角色时）
      user:
        allOf:
        - $ref: '#/definitions/yggdrasil.UserResponse'
        description: 用户信息（requestUser 时返回）
    type: object
  yggdrasil.BatchProfileItem:
    properties:
      id:
        description: 角色无符号 UUID
        type: string
      name:
        description: 角色名称
        type: string
    type: object
  yggdrasil.InvalidateRequest:
    properties:
      accessToken:
        description: 访问令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
    required:
    - accessToken
    type: object
  yggdrasil.JoinServerRequest:
    properties:
      accessToken:
        description: 访问令牌 (UUID 格式 + 余量)
        maxLength: 368
        type: string
      selectedProfile:
        description: 角色无符号 UUID (固定 32 字符)
        maxLength: 32
        type: string
      serverId:
        description: 服务端随机标识
        maxLength: 256
        type: string
    required:
    - accessToken
    - selectedProfile
    - serverId
    type: object
  yggdrasil.MetadataLinks:
    properties:
      homepage:
        description: 主页地址
        type: string
      register:
        description: 注册地址
        type: string
    type: object
  yggdrasil.MetadataMeta:
    properties:
      feature.non_email_login:
        description: 是否支持非邮箱登录
        type: boolean
      implementationName:
        description: 实现名称
        type: string
      implementationVersion:
        description: 实现版本
        type: string
      links:
        allOf:
        - $ref: '#/definitions/yggdrasil.MetadataLinks'
        description: 相关链接（可选）
      serverName:
        description: 服务端名称
        type: string
    type: object
  yggdrasil.MetadataResponse:
    properties:
      meta:
        allOf:
        - $ref: '#/definitions/yggdrasil.MetadataMeta'
        description: 元数据信息
      signaturePublickey:
        description: RSA 签名公钥（PEM 格式）
        type: string
      skinDomains:
        description: 皮肤域名白名单
        items:
          type: string
        type: array
    type: object
  yggdrasil.ProfileResponse:
    properties:
      id:
        description: 角色无符号 UUID
        type: string
      name:
        description: 角色名称
        type: string
      properties:
        description: 角色属性列表（含材质签名等）
        items:
          $ref: '#/definitions/yggdrasil.PropertyResponse'
        type: array
    type: object
  yggdrasil.ProfileSelection:
    properties:
      id:
        description: 角色 UUID（无符号）
        type: string
      name:
        description: 角色名称
        type: string
    type: object
  yggdrasil.PropertyResponse:
    properties:
      name:
        description: 属性名称（如 "textures"）
        type: string
      signature:
        description: 属性签名（Base64 编码，可选）
        type: string
      value:
        description: 属性值（Base64 编码）
        type: string
    type: object
  yggdrasil.RefreshRequest:
    properties:
      accessToken:
        description: 当前令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
      requestUser:
        description: 是否请求用户信息
        type: boolean
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileSelection'
        description: 要选择的角色
    required:
    - accessToken
    type: object
  yggdrasil.RefreshResponse:
    properties:
      accessToken:
        description: 新的访问令牌
        type: string
      clientToken:
        description: 客户端令牌（与原令牌一致）
        type: string
      selectedProfile:
        allOf:
        - $ref: '#/definitions/yggdrasil.ProfileResponse'
        description: 选中的角色信息
      user:
        allOf:
        - $ref: '#/definitions/yggdrasil.UserResponse'
        description: 用户信息（requestUser 时返回）
    type: object
  yggdrasil.SignoutRequest:
    properties:
      password:
        description: 密码
        maxLength: 128
        type: string
      username:
        description: 邮箱或手机号
        maxLength: 320
        type: string
    required:
    - password
    - username
    type: object
  yggdrasil.UserPropertyResponse:
    properties:
      name:
        description: 属性名称（如 "preferredLanguage"）
        type: string
      value:
        description: 属性值
        type: string
    type: object
  yggdrasil.UserResponse:
    properties:
      id:
        description: 用户无符号 UUID
        type: string
      properties:
        description: 用户属性列表
        items:
          $ref: '#/definitions/yggdrasil.UserPropertyResponse'
        type: array
    type: object
  yggdrasil.ValidateRequest:
    properties:
      accessToken:
        description: 访问令牌
        maxLength: 368
        type: string
      clientToken:
        description: 客户端令牌（可选）
        maxLength: 368
        type: string
    required:
    - accessToken
    type: object
  yggdrasil.YggdrasilError:
    properties:
      cause:
        description: 错误原因（可选）
        type: string
      error:
        description: 错误标识（机器可读）
        type: string
      errorMessage:
        description: 错误详情（人类可读）
        type: string
    type: object
info:
  contact: {}
paths:
  /:
    get:
      consumes:
      - application/json
      description: 由 authlib-injector 自动发现和启动器调用，返回 API 元数据（服务名称、签名公钥、皮肤域名等），authlib-injector
        据此自动配置 API 位置。
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/yggdrasil.MetadataResponse'
      summary: '[公共] API 元数据'
      tags:
      - Yggdrasil-公共接口
  /api/profiles/minecraft:
    post:
      consumes:
      - application/json
      description: 由 Minecraft 服务端调用，根据角色名称列表批量查询角色信息。仅返回无符号 UUID 和名称，不包含角色属性。不存在的角色不包含在响应中，单次最多查询
        10 个。
      parameters:
      - description: 角色名称列表（JSON 数组，最多 10 个）
        in: body
        name: names
        required: true
        schema:
          items:
            type: string
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功
          schema:
            items:
              $ref: '#/definitions/yggdrasil.BatchProfileItem'
            type: array
        "400":
          description: 请求体格式错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 批量查询角色'
      tags:
      - Yggdrasil-会话接口
  /api/user/profile/{uuid}/{textureType}:
    delete:
      consumes:
      - application/json
      description: 由启动器调用，清除指定角色的皮肤或披风材质。需通过 Bearer Token 认证，验证令牌有效且角色属于该用户。当前返回 501
        功能尚未实现。
      parameters:
      - description: 角色的无符号 UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: 材质类型：skin 或 cape
        in: path
        name: textureType
        required: true
        type: string
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 清除成功
        "400":
          description: UUID 格式错误或材质类型无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "401":
          description: 未授权或令牌无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 角色不属于该用户
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "501":
          description: 功能尚未实现
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[玩家] 清除材质'
      tags:
      - Yggdrasil-公共接口
    put:
      consumes:
      - multipart/form-data
      description: 由启动器调用，上传皮肤或披风材质。需通过 Bearer Token 认证，验证令牌有效且角色属于该用户。当前返回 501 功能尚未实现。
      parameters:
      - description: 角色的无符号 UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: 材质类型：skin 或 cape
        in: path
        name: textureType
        required: true
        type: string
      - description: 皮肤模型（slim 或空，仅 skin 类型）
        in: formData
        name: model
        type: string
      - description: PNG 图片文件
        in: formData
        name: file
        required: true
        type: file
      - description: Bearer Access Token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 上传成功
        "400":
          description: UUID 格式错误或材质类型无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "401":
          description: 未授权或令牌无效
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 角色不属于该用户
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "501":
          description: 功能尚未实现
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[玩家] 上传材质'
      tags:
      - Yggdrasil-公共接口
  /authserver/authenticate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，使用邮箱或手机号+密码进行登录认证。单角色时自动绑定到令牌并返回 selectedProfile，多角色时通过
        refresh 接口选择角色。
      parameters:
      - description: 登录认证请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.AuthenticateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 认证成功
          schema:
            $ref: '#/definitions/yggdrasil.AuthenticateResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 认证失败（密码错误/账户异常）
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 密码登录认证'
      tags:
      - Yggdrasil-认证接口
  /authserver/invalidate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，吊销指定的 accessToken。无论是否成功，均返回 204 No Content。
      parameters:
      - description: 吊销令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.InvalidateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 处理完成
      summary: '[客户端] 吊销指定令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/refresh:
    post:
      consumes:
      - application/json
      description: 由启动器调用，使用 accessToken 刷新令牌。吊销原令牌并颁发新令牌，携带 selectedProfile 时为角色选择操作。
      parameters:
      - description: 刷新令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            $ref: '#/definitions/yggdrasil.RefreshResponse'
        "400":
          description: 参数错误（角色已绑定仍指定）
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或已过期
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 刷新令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/signout:
    post:
      consumes:
      - application/json
      description: 由启动器调用，验证用户凭证后吊销该用户的所有有效令牌。成功返回 204 No Content，密码错误返回 403 错误。
      parameters:
      - description: 登出请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.SignoutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 登出成功
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 密码错误或账户异常
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 吊销用户所有令牌'
      tags:
      - Yggdrasil-认证接口
  /authserver/validate:
    post:
      consumes:
      - application/json
      description: 由启动器调用，验证 accessToken 是否有效。有效返回 204 No Content，无效返回 403 错误。
      parameters:
      - description: 验证令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.ValidateRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 令牌有效
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或 clientToken 不匹配
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 验证令牌有效性'
      tags:
      - Yggdrasil-认证接口
