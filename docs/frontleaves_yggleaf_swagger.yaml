        maxLength: 255
        type: string
      mime_type:
        maxLength: 64
        type: string
    required:
    - content
    - file_name
    type: object
  library.CapeListResponse:
    properties:
      items:
        description: 披风列表
        items:
          $ref: '#/definitions/library.CapeResponse'
        type: array
      total:
        description: 总数
        type: integer
    type: object
  library.CapeResponse:
    properties:
      assignment_type:
        allOf:
        - $ref: '#/definitions/entityType.AssignmentType'
