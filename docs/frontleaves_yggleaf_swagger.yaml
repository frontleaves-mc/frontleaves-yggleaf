  /user/game-password:
    put:
      consumes:
      - application/json
      description: 已通过 OAuth2 认证的用户可直接设置/重置游戏密码，无需旧密码
      parameters:
      - description: 更新游戏密码请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/user.UpdateGamePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/user.UserCurrentResponse'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[玩家] 更新游戏密码'
      tags:
