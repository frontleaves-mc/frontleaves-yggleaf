        description: 公开皮肤总额度
        type: integer
      skins_public_used:
        description: 公开皮肤已使用额度
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.ModelType:
    enum:
    - 1
    - 2
    format: int32
    type: integer
    x-enum-comments:
      ModelTypeClassic: 经典皮肤模型 (Steve)
      ModelTypeSlim: 纤细皮肤模型 (Alex)
    x-enum-descriptions:
    - 经典皮肤模型 (Steve)
    - 纤细皮肤模型 (Alex)
    x-enum-varnames:
    - ModelTypeClassic
    - ModelTypeSlim
  entity.Role:
    properties:
      description:
        description: 角色描述
        type: string
      display_name:
        description: 角色显示名称
        type: string
      name:
        allOf:
        - $ref: '#/definitions/entity.RoleName'
        description: 角色名称
    type: object
  entity.RoleName:
    enum:
    - SUPER_ADMIN
    - ADMIN
    - PLAYER
    type: string
    x-enum-comments:
      RoleAdmin: 管理员角色名称
      RolePlayer: 普通玩家角色名称
      RoleSuperAdmin: 超级管理员角色名称
    x-enum-descriptions:
    - 超级管理员角色名称
    - 管理员角色名称
    - 普通玩家角色名称
    x-enum-varnames:
    - RoleSuperAdmin
    - RoleAdmin
    - RolePlayer
