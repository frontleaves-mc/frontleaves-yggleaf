      issue_id:
        type: integer
      user_id:
        type: integer
    type: object
  issue.IssueReplyItem:
    properties:
      issue_reply:
        $ref: '#/definitions/issue.IssueReplyEntityWrapper'
      username:
        type: string
    type: object
  issue.IssueTypeEntityWrapper:
    properties:
      description:
        type: string
      id:
        type: integer
      is_enabled:
        type: boolean
      name:
        type: string
      sort_order:
        type: integer
    type: object
  issue.IssueTypeListItem:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      sort_order:
        type: integer
    type: object
