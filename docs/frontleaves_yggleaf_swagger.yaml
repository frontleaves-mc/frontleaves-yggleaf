      cape_library_id:
        description: 关联披风库ID
        type: integer
      id:
        type: integer
      name:
        description: 游戏内用户名
        type: string
      skin_library:
        allOf:
        - $ref: '#/definitions/entity.SkinLibrary'
        description: 关联皮肤库
      skin_library_id:
        description: 关联皮肤库ID
        type: integer
      updated_at:
        type: string
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
      uuid:
        description: Minecraft UUID
        type: string
    type: object
  entity.GameProfileQuota:
    properties:
      id:
        type: integer
      total:
        description: 总额度
        type: integer
      updated_at:
        type: string
      used:
        description: 已使用额度
        type: integer
      user:
        allOf:
        - $ref: '#/definitions/entity.User'
        description: |-
          ----------
           外键约束
          ----------
      user_id:
        description: 关联用户ID
        type: integer
    type: object
  entity.LibraryQuota:
