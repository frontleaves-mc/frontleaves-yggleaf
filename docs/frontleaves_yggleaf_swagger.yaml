        description: 披风配额
        type: integer
      capes_private_used:
        description: 私有披风已使用额度
        type: integer
      capes_public_total:
        description: 公开披风总额度
        type: integer
      capes_public_used:
        description: 公开披风已使用额度
        type: integer
      id:
