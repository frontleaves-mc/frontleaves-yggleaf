  /sessionserver/session/minecraft/hasJoined:
    get:
      consumes:
      - application/json
      description: 由 Minecraft 服务端调用，通过 username 和 serverId 验证客户端是否已成功加入服务器。验证通过后返回角色完整信息（含
        textures 属性和数字签名）。
      parameters:
      - description: 角色名称
        in: query
        name: username
        required: true
        type: string
      - description: 服务端生成的随机标识
        in: query
        name: serverId
        required: true
        type: string
      - description: 客户端 IP 地址（可选，用于防止代理连接）
        in: query
        name: ip
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 验证成功，返回角色完整信息
          schema:
            $ref: '#/definitions/yggdrasil.ProfileResponse'
        "204":
          description: 未找到匹配的会话
        "400":
          description: 缺少必要参数或参数过长
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 验证客户端会话'
      tags:
      - Yggdrasil-会话接口
  /sessionserver/session/minecraft/join:
    post:
      consumes:
      - application/json
      description: 由 Minecraft 客户端调用，记录加入服务器的会话信息。验证令牌有效且 selectedProfile 与令牌绑定角色一致。
      parameters:
      - description: 加入服务器请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/yggdrasil.JoinServerRequest'
      produces:
      - application/json
      responses:
        "204":
          description: 会话记录成功
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "403":
          description: 令牌无效或角色不匹配
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[客户端] 客户端加入服务器'
      tags:
      - Yggdrasil-会话接口
  /sessionserver/session/minecraft/profile/{uuid}:
    get:
      consumes:
      - application/json
      description: 由 Minecraft 服务端或客户端调用，查询指定 UUID 的角色信息。根据 unsigned 参数决定是否包含 textures
        属性的数字签名。
      parameters:
      - description: 角色的无符号 UUID（32 位十六进制字符串）
        in: path
        name: uuid
        required: true
        type: string
      - description: 是否不含签名，默认 true
        in: query
        name: unsigned
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: 查询成功，返回角色信息（含属性）
          schema:
            $ref: '#/definitions/yggdrasil.ProfileResponse'
        "204":
          description: 角色不存在
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/yggdrasil.YggdrasilError'
      summary: '[服务端] 查询角色属性'
      tags:
      - Yggdrasil-会话接口
  /sync/config/metadata:
    get:
      description: 递归扫描服务端 config 目录下所有文件，返回文件列表及 SHA-256 哈希
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/sync.SyncMetadataResponse'
              type: object
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[公开] Config 元数据'
      tags:
      - 同步接口
  /sync/download:
    get:
      description: 根据相对路径下载 mods 或 config 下的指定文件，支持流式传输
      parameters:
      - description: 文件相对路径（如 mods/jei-1.20.1.jar）
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 文件流
          schema:
            type: file
        "400":
          description: 参数错误或非法路径
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 文件不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[公开] 下载文件'
      tags:
      - 同步接口
  /sync/extends/metadata:
    get:
      description: 递归扫描服务端 extends 目录下所有文件，返回文件列表及 SHA-256 哈希
