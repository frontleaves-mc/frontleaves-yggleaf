        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[玩家] 获取皮肤列表'
      tags:
      - 资源库接口
    post:
      consumes:
      - application/json
      description: 上传并创建一个新的皮肤资源，纹理文件以 base64 编码传输
      parameters:
      - description: 创建皮肤请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/library.CreateSkinRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.SkinLibrary'
              type: object
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "409":
