          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "503":
          description: 配额耗尽
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[玩家] 创建皮肤'
      tags:
      - 资源库接口
  /api/v1/library/skins/{skin_id}:
    delete:
      consumes:
      - application/json
      description: 删除指定皮肤，只能删除自己创建的皮肤
      parameters:
      - description: 皮肤 ID
        in: path
        name: skin_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "404":
          description: 资源不存在
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
      summary: '[玩家] 删除皮肤'
      tags:
      - 资源库接口
    patch:
      consumes:
      - application/json
      description: 修改指定皮肤的名称或公开状态，只能修改自己创建的皮肤
      parameters:
      - description: 皮肤 ID
        in: path
        name: skin_id
        required: true
        type: string
      - description: 更新皮肤请求
        in: body
