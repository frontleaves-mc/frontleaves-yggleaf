      summary: '[玩家] 更新皮肤'
      tags:
      - 资源库接口
  /api/v1/user/info:
    get:
      consumes:
      - application/json
      description: 根据 AT 获取用户信息，获取到本程序的用户信息
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            allOf:
            - $ref: '#/definitions/xBase.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/entity.User'
              type: object
        "400":
          description: 请求体格式不正确
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/xBase.BaseResponse'
        "403":
          description: 用户已禁用或账户已锁定
          schema:
