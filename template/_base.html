{{define "base"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{.Subject}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f0f2f5;">
        <tr>
            <td align="center" style="padding: 40px 16px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); overflow: hidden;">
                    <tr>
                        <td align="center" style="padding: 28px 32px; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">
                            <h1 style="margin: 0; font-size: 20px; font-weight: 600; color: #ffffff; letter-spacing: 1px;">
                                锋楪 · 游戏
                            </h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 36px 32px; color: #333333; font-size: 15px; line-height: 1.7;">
                            {{template "content" .}}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px 32px; border-top: 1px solid #eee; background-color: #fafafa;">
                            <p style="margin: 0; font-size: 12px; color: #aaaaaa; text-align: center; line-height: 1.6;">
                                此邮件由锋楪技术自动发送，请勿直接回复。如有疑问请联系管理员。
                            </p>
                            <p style="margin: 6px 0 0; font-size: 12px; color: #aaaaaa; text-align: center; line-height: 1.6;">
                                &copy; 锋楪技术（深圳）有限公司
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
{{end}}
