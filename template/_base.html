{{define "base"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{.Subject}}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #F2F4F7; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #F2F4F7;">
        <tr>
            <td align="center" style="padding: 48px 16px;">
                <table role="presentation" width="580" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-radius: 10px; border: 1px solid #DAE2EB; overflow: hidden;">
                    <tr>
                        <td style="padding: 32px 40px 24px; border-bottom: 1px solid #DAE2EB;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td>
                                        <h1 style="margin: 0; font-size: 16px; font-weight: 600; color: #1A1E26; letter-spacing: -0.2px;">
                                            锋楪 · 游戏
                                        </h1>
                                    </td>
                                    <td align="right" style="vertical-align: middle;">
                                        <span style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background-color: #3B76D8;"></span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 32px 40px; color: #1A1E26; font-size: 14px; line-height: 1.7;">
                            {{template "content" .}}
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px 40px; border-top: 1px solid #DAE2EB;">
                            <p style="margin: 0; font-size: 12px; color: #6B7F96; text-align: center; line-height: 1.6;">
                                此邮件由锋楪技术自动发送，请勿直接回复。
                            </p>
                            <p style="margin: 4px 0 0; font-size: 12px; color: #9AABB8; text-align: center; line-height: 1.6;">
                                &copy; 锋楪技术（深圳）有限公司
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
{{end}}
