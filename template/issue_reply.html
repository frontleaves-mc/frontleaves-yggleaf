{{define "issue_reply"}}
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td style="padding-bottom: 20px;">
            <h2 style="margin: 0 0 8px; font-size: 18px; font-weight: 600; color: #1A1E26; letter-spacing: -0.3px;">
                问题回复通知
            </h2>
            {{if .IsAdminReply}}
            <p style="margin: 0; font-size: 14px; color: #6B7F96; line-height: 1.6;">
                管理员 <strong style="color: #1A1E26;">{{.ReplyUser}}</strong> 回复了您的问题 <strong style="color: #1A1E26;">{{.Title}}</strong>
            </p>
            {{else}}
            <p style="margin: 0; font-size: 14px; color: #6B7F96; line-height: 1.6;">
                用户 <strong style="color: #1A1E26;">{{.ReplyUser}}</strong> 回复了问题 <strong style="color: #1A1E26;">{{.Title}}</strong>
            </p>
            {{end}}
        </td>
    </tr>
    <tr>
        <td style="padding-bottom: 24px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #F2F4F7; border-radius: 8px;">
                <tr>
                    <td style="padding: 16px; font-size: 14px; color: #1A1E26; line-height: 1.7; word-break: break-word;">
                        {{.Content}}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td>
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td style="border-radius: 8px; background-color: #3B76D8;">
                        <a href="{{.IssueURL}}" target="_blank" style="display: inline-block; padding: 10px 24px; font-size: 13px; font-weight: 500; color: #F0F6FD; text-decoration: none; letter-spacing: -0.1px;">
                            查看详情
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
{{end}}
