name: frontleaves-yggleaf
services:
  frontleaves-yggleaf:
    image: ccr.ccs.tencentyun.com/frontleaves/frontleaves-yggleaf:latest
    container_name: frontleaves-yggleaf-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    ports:
      - "5577:5577"
    volumes:
      - .logs:/app/.logs
    networks:
      - default
      - 1panel-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5577/api/v1/health/ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
networks:
  default:
    name: frontleaves-yggleaf-network
  1panel-network:
    external: true
